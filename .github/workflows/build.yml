name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download Skia
        shell: bash
        run: |
          workspace=$(cygpath "${{ github.workspace }}")
          skia_url=$(source "$workspace/laf/misc/skia-url.sh" | xargs)
          skia_file=$(basename "$skia_url")
          curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
          unzip -q "$skia_file" -d skia

      - name: Configure CMake
        shell: bash
        run: |
          skia_dir=$(cygpath -m "$PWD/skia")
          skia_library_dir=$(cygpath -m "$PWD/skia/out/Release-x64")
          skia_library="$skia_library_dir/skia.lib"

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR="$skia_dir" \
            -DSKIA_LIBRARY_DIR="$skia_library_dir" \
            -DSKIA_LIBRARY="$skia_library"

      - name: Build Aseprite
        shell: bash
        run: cmake --build build --target aseprite --parallel

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "build/bin/aseprite.exe" "dist/aseprite-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows-x64
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Move release tag
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f latest-sync ${{ github.sha }}
          git push -f origin latest-sync

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-sync
          name: Latest sync build
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: dist/*
